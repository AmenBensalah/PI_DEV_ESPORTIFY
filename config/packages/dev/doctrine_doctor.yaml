doctrine_doctor:
    enabled: true
    analyzers:
        n_plus_one:
            enabled: true
            threshold: 3
        slow_query:
            enabled: true
            threshold: 10
        missing_index:
            enabled: true
            slow_query_threshold: 5
            explain_queries: true
            min_rows_scanned: 500
        hydration:
            enabled: false
        eager_loading:
            enabled: false
        find_all:
            enabled: false
        entity_manager_clear:
            enabled: false
        get_reference:
            enabled: false
        flush_in_loop:
            enabled: false
        lazy_loading:
            enabled: false
        dql_injection:
            enabled: false
        bulk_operation:
            enabled: false
        strict_mode:
            enabled: false
        charset:
            enabled: false
        inno_db_engine:
            enabled: false
        connection_pooling:
            enabled: false
        collection_initialization:
            enabled: false
        cascade_configuration:
            enabled: false
        sensitive_data_exposure:
            enabled: false
        insecure_random:
            enabled: false
        sql_injection_raw_queries:
            enabled: false
        foreign_key_mapping:
            enabled: false
        partial_object:
            enabled: false
        dto_hydration:
            enabled: false
        cascade_all:
            enabled: false
        cascade_persist_independent:
            enabled: false
        missing_orphan_removal:
            enabled: false
        cascade_remove_independent:
            enabled: false
        bidirectional_consistency:
            enabled: false
        orphan_removal_no_cascade:
            enabled: false
        ondelete_mismatch:
            enabled: false
        join_optimization:
            enabled: false
        doctrine_cache:
            enabled: false
        naming_convention:
            enabled: false
        missing_embeddable_opportunity:
            enabled: false
        blameable_trait:
            enabled: false
    profiler:
        show_in_toolbar: true
        show_debug_info: false
    analysis:
        exclude_third_party_entities: true
        exclude_paths:
            - vendor/
            - '%kernel.project_dir%/src/Entity/'
